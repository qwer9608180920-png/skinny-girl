<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>機台巡檢系統管理端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f1f5f9; }
        .sidebar-item.active { background-color: #3b82f6; color: white; border-radius: 8px; }
        .hidden-page { display: none; }
    </style>
</head>
<body class="flex min-h-screen">

    <aside class="w-64 bg-[#1e293b] text-slate-300 p-4 flex-shrink-0 flex flex-col shadow-xl">
        <div class="flex items-center gap-3 px-2 mb-8 mt-2">
            <div class="bg-blue-500 p-2 rounded-lg text-white"><i class="fas fa-clipboard-check text-xl"></i></div>
            <span class="font-bold text-white tracking-wider text-lg">巡檢管理系統</span>
        </div>
        
        <nav class="flex-1 space-y-2">
            <a href="#" onclick="showPage('inspect')" class="sidebar-item active flex items-center gap-3 px-4 py-3 transition"><i class="fas fa-edit w-5"></i> 巡檢填報</a>
            <a href="#" onclick="showPage('records')" class="sidebar-item flex items-center gap-3 px-4 py-3 transition"><i class="fas fa-table w-5"></i> 數據查詢</a>
            <div class="pt-4 pb-2 border-t border-slate-700 mx-2 text-[10px] text-slate-500 font-bold uppercase">管理功能</div>
            <a href="#" onclick="showPage('admin-areas')" class="sidebar-item flex items-center gap-3 px-4 py-3 transition"><i class="fas fa-map-marked-alt w-5"></i> 區域/地點管理</a>
            <a href="#" onclick="showPage('admin-reporters')" class="sidebar-item flex items-center gap-3 px-4 py-3 transition"><i class="fas fa-users-cog w-5"></i> 提報人員管理</a>
            <a href="#" onclick="showPage('settings')" class="sidebar-item flex items-center gap-3 px-4 py-3 transition"><i class="fas fa-cog w-5"></i> 系統串接設定</a>
        </nav>
    </aside>

    <main class="flex-1 p-8 overflow-y-auto">
        
        <section id="page-inspect" class="max-w-xl mx-auto space-y-6">
            <h2 class="text-2xl font-bold text-slate-800 border-l-4 border-blue-500 pl-3">巡檢資料填寫</h2>
            <div class="bg-white p-6 rounded-2xl shadow-sm space-y-4">
                <div>
                    <label class="block text-sm font-bold text-slate-600 mb-1">區域</label>
                    <select id="sel-area" onchange="syncLocSelect()" class="w-full border p-3 rounded-xl bg-slate-50 outline-none"></select>
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-600 mb-1">具體地點</label>
                    <select id="sel-loc" class="w-full border p-3 rounded-xl bg-slate-50 outline-none"></select>
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-600 mb-1">巡檢人員</label>
                    <select id="sel-reporter" class="w-full border p-3 rounded-xl bg-slate-50 outline-none"></select>
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-600 mb-1">狀況說明</label>
                    <textarea id="txt-note" class="w-full border p-3 rounded-xl bg-slate-50 h-24" placeholder="請輸入備註..."></textarea>
                </div>
                <button onclick="uploadToCloud()" id="btn-submit" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-blue-700 transition">確認儲存並同步至雲端</button>
            </div>
        </section>

        <section id="page-admin-areas" class="hidden-page max-w-4xl mx-auto space-y-6">
            <h2 class="text-2xl font-bold text-slate-800">區域與地點設定</h2>
            <div class="bg-white p-6 rounded-xl shadow-sm border space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="new-area" class="border p-2 rounded shadow-inner" placeholder="新增區域 (如: A廠 3F)">
                    <button onclick="addArea()" class="bg-slate-800 text-white px-4 py-2 rounded shadow hover:bg-black">+ 新增區域</button>
                </div>
                <div id="area-editor-list" class="space-y-4 pt-4"></div>
            </div>
        </section>

        <section id="page-admin-reporters" class="hidden-page max-w-xl mx-auto space-y-6">
            <h2 class="text-2xl font-bold text-slate-800">人員名單管理</h2>
            <div class="bg-white p-6 rounded-xl shadow-sm border space-y-4">
                <div class="flex gap-2">
                    <input type="text" id="new-name" class="flex-1 border p-2 rounded" placeholder="輸入姓名">
                    <button onclick="addName()" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">新增</button>
                </div>
                <ul id="name-list" class="divide-y"></ul>
            </div>
        </section>

        <section id="page-settings" class="hidden-page max-w-xl mx-auto space-y-6">
            <div class="bg-orange-50 border-l-4 border-orange-400 p-4">
                <p class="text-orange-700 text-sm font-bold">⚠️ 系統提示：</p>
                <p class="text-orange-600 text-xs">請將 Google Apps Script 部署後的網址貼在下方，方可使用同步功能。</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border">
                <label class="block text-sm font-bold mb-2 text-slate-700">Google API 網址</label>
                <input type="text" id="input-api-url" onchange="saveConfig()" class="w-full border p-3 rounded-lg text-sm bg-slate-50" placeholder="https://script.google.com/macros/s/.../exec">
            </div>
        </section>

    </main>

    <script>
        // 初始化資料 (如果本地有存檔就讀取，沒有就用預設)
        let config = JSON.parse(localStorage.getItem('ins_config')) || {
            apiUrl: '',
            reporters: ['王大明', '李小華'],
            areas: {
                'A廠 1F': ['機台正面照', '1F下料車道'],
                'B廠 1F': ['1F保溫桶車道', '1F樓梯處']
            }
        };

        function showPage(pageId) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden-page'));
            document.getElementById('page-' + pageId).classList.remove('hidden-page');
            document.querySelectorAll('.sidebar-item').forEach(item => item.classList.remove('active'));
            event.currentTarget.classList.add('active');
            if(pageId === 'admin-areas') renderAreaEditor();
            if(pageId === 'admin-reporters') renderReporterList();
            refreshSelects();
        }

        // --- 核心邏輯：管理人員 ---
        function renderReporterList() {
            const list = document.getElementById('name-list');
            list.innerHTML = config.reporters.map((name, i) => `
                <li class="py-3 flex justify-between items-center text-slate-700">
                    <span>${name}</span>
                    <button onclick="removeName(${i})" class="text-red-400 hover:text-red-600 text-sm">刪除</button>
                </li>`).join('');
        }
        function addName() {
            const val = document.getElementById('new-name').value;
            if(val) { config.reporters.push(val); saveConfig(); renderReporterList(); document.getElementById('new-name').value=''; }
        }
        function removeName(i) { config.reporters.splice(i, 1); saveConfig(); renderReporterList(); }

        // --- 核心邏輯：管理區域與地點 ---
        function renderAreaEditor() {
            const container = document.getElementById('area-editor-list');
            container.innerHTML = Object.keys(config.areas).map(area => `
                <div class="p-4 bg-slate-50 rounded-lg border border-slate-200">
                    <div class="flex justify-between items-center mb-2">
                        <strong class="text-blue-600">${area}</strong>
                        <button onclick="removeArea('${area}')" class="text-xs text-red-500 underline">刪除整個區域</button>
                    </div>
                    <div class="flex gap-2 mb-2">
                        <input type="text" id="loc-for-${area}" class="flex-1 text-sm border p-1 rounded" placeholder="新增地點名稱">
                        <button onclick="addLoc('${area}')" class="bg-green-500 text-white text-xs px-2 py-1 rounded">＋新增地點</button>
                    </div>
                    <div class="flex flex-wrap gap-2">
                        ${config.areas[area].map((loc, i) => `<span class="bg-white border px-2 py-1 rounded-full text-xs flex items-center gap-1">${loc} <i onclick="removeLoc('${area}', ${i})" class="fas fa-times-circle text-slate-300 hover:text-red-500 cursor-pointer"></i></span>`).join('')}
                    </div>
                </div>
            `).join('');
        }
        function addArea() {
            const val = document.getElementById('new-area').value;
            if(val) { config.areas[val] = []; saveConfig(); renderAreaEditor(); document.getElementById('new-area').value=''; }
        }
        function removeArea(name) { if(confirm('確定刪除？')) { delete config.areas[name]; saveConfig(); renderAreaEditor(); } }
        function addLoc(area) {
            const val = document.getElementById('loc-for-'+area).value;
            if(val) { config.areas[area].push(val); saveConfig(); renderAreaEditor(); }
        }
        function removeLoc(area, i) { config.areas[area].splice(i, 1); saveConfig(); renderAreaEditor(); }

        // --- 儲存與同步 ---
        function saveConfig() {
            config.apiUrl = document.getElementById('input-api-url').value;
            localStorage.setItem('ins_config', JSON.stringify(config));
        }

        function refreshSelects() {
            document.getElementById('sel-area').innerHTML = Object.keys(config.areas).map(a => `<option>${a}</option>`).join('');
            document.getElementById('sel-reporter').innerHTML = config.reporters.map(r => `<option>${r}</option>`).join('');
            syncLocSelect();
            document.getElementById('input-api-url').value = config.apiUrl;
        }

        function syncLocSelect() {
            const area = document.getElementById('sel-area').value;
            if(area) document.getElementById('sel-loc').innerHTML = config.areas[area].map(l => `<option>${l}</option>`).join('');
        }

        async function uploadToCloud() {
            if(!config.apiUrl) return alert('請先到「系統串接設定」貼上 Google 網址');
            const btn = document.getElementById('btn-submit');
            btn.disabled = true; btn.innerText = '正在雲端同步...';
            
            const data = {
                area: document.getElementById('sel-area').value,
                location: document.getElementById('sel-loc').value,
                reporter: document.getElementById('sel-reporter').value,
                note: document.getElementById('txt-note').value
            };

            try {
                await fetch(config.apiUrl, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                alert('上傳成功！');
                document.getElementById('txt-note').value = '';
            } catch (e) {
                alert('連線失敗，請檢查網路或網址。');
            } finally {
                btn.disabled = false; btn.innerText = '確認儲存並同步至雲端';
            }
        }

        window.onload = refreshSelects;
    </script>
</body>
</html>
